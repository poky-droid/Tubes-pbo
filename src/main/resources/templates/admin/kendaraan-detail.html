<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${kendaraan['merk']} + ' ' + ${kendaraan['model']} + ' - Detail Kendaraan'">Detail Kendaraan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="/css/style10.css" rel="stylesheet"/>
  <style>
    /* ── Layout detail ── */
    .detail-layout {
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      gap: 20px;
    }
    @media (max-width: 900px) {
      .detail-layout { grid-template-columns: 1fr; }
    }

    .detail-card {
      background: var(--dark-3, #1a1a1a);
      border: 1px solid var(--dark-4, #2a2a2a);
      border-radius: 12px;
      overflow: hidden;
    }

    .detail-photo-wrap {
      position: relative;
      width: 100%;
      height: 320px;
      background: var(--dark-4, #2a2a2a);
    }
    .detail-photo-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .detail-photo-emoji {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 72px;
    }
    .photo-edit-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.55);
      display: none;
      align-items: center; justify-content: center;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
      color: #fff;
      font-size: 13px;
      text-align: center;
    }
    .v-edit .photo-edit-overlay { display: flex; }
    .photo-edit-overlay i { font-size: 24px; }
    .photo-edit-overlay input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }

    .detail-body { padding: 22px; }

    .spec-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--dark-4, #2a2a2a);
    }
    .spec-row:last-child { border-bottom: none; }
    .spec-label {
      font-size: 12px;
      color: var(--muted, #888);
      text-transform: uppercase;
      letter-spacing: .04em;
      flex: 0 0 160px;
    }
    .spec-value-wrap { flex: 1; text-align: right; }

    .spec-row .view-field { font-size: 14px; font-weight: 500; }
    .spec-row .edit-field { display: none; width: 100%; text-align: right; }
    .v-edit .spec-row .view-field { display: none; }
    .v-edit .spec-row .edit-field { display: inline-block; }

    .subfield-divider {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted, #888);
      margin: 18px 0 4px;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 6px;
    }
    .detail-title-edit { display: none; }
    .v-edit .detail-title-view { display: none; }
    .v-edit .detail-title-edit { display: block; }

    .action-bar {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .view-only-actions { display: flex; gap: 10px; }
    .v-edit .view-only-actions { display: none; }
    .edit-only-actions { display: none; gap: 10px; }
    .v-edit .edit-only-actions { display: flex; }
  </style>
</head>
<body>

<div id="sidebar"></div>

<div id="main">
  <div class="topbar">
    <div class="topbar-title">Detail Kendaraan</div>
    <div class="topbar-right">
      <a th:href="@{/admin/kendaraan}" class="btn-og" style="text-decoration:none;">
        <i class="bi bi-arrow-left me-1"></i>Kembali
      </a>
    </div>
  </div>

  <div class="content">

    <div th:if="${success}" class="alert alert-success" th:text="${success}" role="alert"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}" role="alert"></div>

    <form th:action="@{/admin/kendaraan/edit/{id}(id=${kendaraan['id_kendaraan']})}"
          method="POST" enctype="multipart/form-data" id="formEditKendaraan">

      <div class="detail-layout" id="detailWrap">

        <!-- ── FOTO ── -->
        <div class="detail-card">
          <div class="detail-photo-wrap">

            <img th:if="${kendaraan['foto'] != null and !#strings.isEmpty(kendaraan['foto'])}"
                 id="detailFotoImg"
                 th:src="@{/uploads/kendaraan/{foto}(foto=${kendaraan['foto']})}"
                 alt="Foto Kendaraan"/>

            <div th:unless="${kendaraan['foto'] != null and !#strings.isEmpty(kendaraan['foto'])}"
                 id="detailFotoEmoji"
                 class="detail-photo-emoji"
                 th:text="${kendaraan['jenis'] == 'mobil' ? '🚗' : '🏍️'}"></div>

            <label class="photo-edit-overlay" id="photoEditOverlay">
              <i class="bi bi-camera-fill"></i>
              <span>Klik untuk ganti foto</span>
              <input type="file" name="foto" id="fotoInput" accept="image/*"/>
            </label>

          </div>
        </div>

        <!-- ── DETAIL / FORM ── -->
        <div class="detail-card">
          <div class="detail-body">

            <div class="detail-header">
              <div>
                <span class="b-status" th:text="${kendaraan['jenis'] == 'mobil' ? '🚗 Mobil' : '🏍️ Motor'}"
                      style="margin-bottom:8px;display:inline-block;"></span>

                <div class="detail-title-view">
                  <h1 style="font-size:24px;margin:6px 0 2px;font-weight:700;"
                      th:text="${kendaraan['merk']} + ' ' + ${kendaraan['model']}">Nama Kendaraan</h1>
                  <div style="color:var(--muted,#888);font-size:13px;"
                       th:text="'Tahun ' + ${kendaraan['tahun']}"></div>
                </div>

                <div class="detail-title-edit" style="display:flex;gap:8px;margin-top:6px;">
                  <input name="merk" class="form-c" th:value="${kendaraan['merk']}" placeholder="Merk" required style="max-width:140px;"/>
                  <input name="model" class="form-c" th:value="${kendaraan['model']}" placeholder="Model" required style="max-width:140px;"/>
                  <input name="tahun" class="form-c" type="number" th:value="${kendaraan['tahun']}" placeholder="Tahun" required style="max-width:100px;"/>
                </div>
              </div>

              <span th:class="'b-status b-' + ${#strings.toLowerCase(#strings.replace(kendaraan['status'], ' ', ''))}"
                    th:text="${kendaraan['status']}">Status</span>
            </div>

            <!-- ── Spek umum ── -->
            <div class="spec-row">
              <div class="spec-label">Harga</div>
              <div class="spec-value-wrap">
                <span class="view-field" th:text="'Rp ' + ${#numbers.formatDecimal(kendaraan['harga'], 0, 'COMMA', 0, 'POINT')}"></span>
                <input class="edit-field form-c" name="harga" type="number" th:value="${kendaraan['harga']}" required/>
              </div>
            </div>

            <div class="spec-row">
              <div class="spec-label">Status</div>
              <div class="spec-value-wrap">
                <span class="view-field" th:text="${kendaraan['status']}"></span>
                <select class="edit-field form-c" name="status">
                  <option value="Tersedia" th:selected="${kendaraan['status'] == 'Tersedia'}">Tersedia</option>
                  <option value="Test Drive" th:selected="${kendaraan['status'] == 'Test Drive'}">Test Drive</option>
                  <option value="Terjual" th:selected="${kendaraan['status'] == 'Terjual'}">Terjual</option>
                </select>
              </div>
            </div>

            <div class="spec-row">
              <div class="spec-label">Warna</div>
              <div class="spec-value-wrap">
                <span class="view-field" th:text="${kendaraan['warna']}"></span>
                <input class="edit-field form-c" name="warna" th:value="${kendaraan['warna']}" placeholder="Merah, Putih, ..."/>
              </div>
            </div>

            <!-- ── Spek MOBIL ── -->
            <th:block th:if="${kendaraan['jenis'] == 'mobil'}">
              <div class="subfield-divider">Detail Mobil</div>

              <div class="spec-row">
                <div class="spec-label">Jenis Mobil</div>
                <div class="spec-value-wrap">
                  <span class="view-field" th:text="${kendaraan['jenis_mobil']}"></span>
                  <select class="edit-field form-c" name="jenisMobil">
                    <option value="Sedan" th:selected="${kendaraan['jenis_mobil'] == 'Sedan'}">Sedan</option>
                    <option value="SUV" th:selected="${kendaraan['jenis_mobil'] == 'SUV'}">SUV</option>
                    <option value="MPV" th:selected="${kendaraan['jenis_mobil'] == 'MPV'}">MPV</option>
                    <option value="Hatchback" th:selected="${kendaraan['jenis_mobil'] == 'Hatchback'}">Hatchback</option>
                    <option value="Pickup" th:selected="${kendaraan['jenis_mobil'] == 'Pickup'}">Pickup</option>
                  </select>
                </div>
              </div>

              <div class="spec-row">
                <div class="spec-label">Mesin</div>
                <div class="spec-value-wrap">
                  <span class="view-field" th:text="${kendaraan['mesin_mobil']}"></span>
                  <select class="edit-field form-c" name="mesinMobil">
                    <option value="Bensin" th:selected="${kendaraan['mesin_mobil'] == 'Bensin'}">Bensin</option>
                    <option value="Diesel" th:selected="${kendaraan['mesin_mobil'] == 'Diesel'}">Diesel</option>
                    <option value="Hybrid" th:selected="${kendaraan['mesin_mobil'] == 'Hybrid'}">Hybrid</option>
                    <option value="Listrik" th:selected="${kendaraan['mesin_mobil'] == 'Listrik'}">Listrik</option>
                  </select>
                </div>
              </div>

              <div class="spec-row">
                <div class="spec-label">Transmisi</div>
                <div class="spec-value-wrap">
                  <span class="view-field" th:text="${kendaraan['transmisi_mobil']}"></span>
                  <select class="edit-field form-c" name="transmisiMobil">
                    <option value="Manual" th:selected="${kendaraan['transmisi_mobil'] == 'Manual'}">Manual</option>
                    <option value="Automatic" th:selected="${kendaraan['transmisi_mobil'] == 'Automatic'}">Automatic</option>
                    <option value="CVT" th:selected="${kendaraan['transmisi_mobil'] == 'CVT'}">CVT</option>
                  </select>
                </div>
              </div>

              <div class="spec-row">
                <div class="spec-label">Kapasitas</div>
                <div class="spec-value-wrap">
                  <span class="view-field" th:text="${kendaraan['kapasitas_mobil']} + ' Orang'"></span>
                  <input class="edit-field form-c" name="kapasitasMobil" type="number" th:value="${kendaraan['kapasitas_mobil']}"/>
                </div>
              </div>
            </th:block>

            <!-- ── Spek MOTOR ── -->
            <th:block th:if="${kendaraan['jenis'] == 'motor'}">
              <div class="subfield-divider">Detail Motor</div>

              <div class="spec-row">
                <div class="spec-label">Jenis Motor</div>
                <div class="spec-value-wrap">
                  <span class="view-field" th:text="${kendaraan['jenis_motor']}"></span>
                  <select class="edit-field form-c" name="jenisMotor">
                    <option value="Matic" th:selected="${kendaraan['jenis_motor'] == 'Matic'}">Matic</option>
                    <option value="Manual" th:selected="${kendaraan['jenis_motor'] == 'Manual'}">Manual</option>
                    <option value="Sport" th:selected="${kendaraan['jenis_motor'] == 'Sport'}">Sport</option>
                    <option value="Trail" th:selected="${kendaraan['jenis_motor'] == 'Trail'}">Trail</option>
                  </select>
                </div>
              </div>

              <div class="spec-row">
                <div class="spec-label">Kapasitas Mesin</div>
                <div class="spec-value-wrap">
                  <span class="view-field" th:text="${kendaraan['cc']} + ' cc'"></span>
                  <input class="edit-field form-c" name="cc" type="number" th:value="${kendaraan['cc']}"/>
                </div>
              </div>

              <div class="spec-row">
                <div class="spec-label">Kapasitas Tangki</div>
                <div class="spec-value-wrap">
                  <span class="view-field" th:text="${kendaraan['kapasitas_tangki']} + ' liter'"></span>
                  <input class="edit-field form-c" name="kapasitasTangki" type="number" step="0.1" th:value="${kendaraan['kapasitas_tangki']}"/>
                </div>
              </div>
            </th:block>

            <!-- ── Action buttons ── -->
            <div class="action-bar">
              <div class="view-only-actions">
                <button type="button" class="btn-gold" id="btnMulaiEdit">
                  <i class="bi bi-pencil-fill me-1"></i>Edit
                </button>
                <a th:href="@{/admin/kendaraan/hapus/{id}(id=${kendaraan['id_kendaraan']})}"
                   class="btn-red"
                   style="text-decoration:none;"
                   onclick="return confirm('Apakah Anda yakin ingin menghapus kendaraan ini?');">
                  <i class="bi bi-trash-fill me-1"></i>Hapus
                </a>
              </div>
              <div class="edit-only-actions">
                <button type="submit" class="btn-gold">
                  <i class="bi bi-check-lg me-1"></i>Simpan
                </button>
                <button type="button" class="btn-red" id="btnBatalEdit">
                  Batal
                </button>
              </div>
            </div>

          </div>
        </div>

      </div>
    </form>

    <div class="pg-footer mt-4">AUTOPRIME SHOWROOM MANAGEMENT &nbsp;·&nbsp; © 2026</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  renderSidebar('kendaraan.html');

  const detailWrap   = document.getElementById('detailWrap');
  const btnMulaiEdit = document.getElementById('btnMulaiEdit');
  const btnBatalEdit = document.getElementById('btnBatalEdit');
  const fotoInput    = document.getElementById('fotoInput');
  const fotoImg      = document.getElementById('detailFotoImg');
  const fotoEmoji    = document.getElementById('detailFotoEmoji');

  btnMulaiEdit.addEventListener('click', () => {
    detailWrap.classList.add('v-edit');
  });

  btnBatalEdit.addEventListener('click', () => {
    detailWrap.classList.remove('v-edit');
    document.getElementById('formEditKendaraan').reset();
    // kembalikan preview foto ke foto asli (batalkan pilihan baru kalau ada)
    if (fotoImg) fotoImg.src = fotoImg.getAttribute('src');
  });

  // Preview foto baru saat dipilih, tanpa langsung upload
  if (fotoInput) {
    fotoInput.addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;

      if (file.size > 5 * 1024 * 1024) {
        alert('Ukuran foto terlalu besar. Maksimal 5 MB.');
        this.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = e => {
        if (fotoImg) {
          fotoImg.src = e.target.result;
        } else if (fotoEmoji) {
          // belum ada foto sebelumnya -> ganti emoji jadi <img> baru
          const img = document.createElement('img');
          img.id = 'detailFotoImg';
          img.src = e.target.result;
          fotoEmoji.replaceWith(img);
        }
      };
      reader.readAsDataURL(file);
    });
  }
</script>
</body>
</html>
