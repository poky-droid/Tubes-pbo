<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artomoro Showroom – Kendaraan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="/css/style10.css" rel="stylesheet"/>
  <style>
    .upload-area {
      border: 2px dashed var(--dark-4);
      border-radius: 10px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      background: var(--dark-3);
      position: relative;
    }
    .upload-area:hover, .upload-area.drag-over {
      border-color: var(--gold);
      background: rgba(201,168,76,.05);
    }
    .upload-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon { font-size: 28px; color: var(--muted); margin-bottom: 6px; }
    .upload-text { font-size: 12px; color: var(--muted); }
    .upload-text span { color: var(--gold); font-weight: 600; }

    #fotoPreviewWrap {
      display: none;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid var(--gold);
    }
    #fotoPreviewWrap img {
      width: 100%; height: 160px; object-fit: cover; display: block;
    }
    #hapusFotoBtn {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,.65); border: none; border-radius: 50%;
      width: 28px; height: 28px; color: #fff; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .2s;
    }
    #hapusFotoBtn:hover { background: var(--red); }

    .v-thumb-img {
      width: 100%; height: 130px; object-fit: cover;
      border-radius: 8px; margin-bottom: 12px;
      border: 1px solid var(--dark-4);
    }
    .v-thumb-emoji {
      height: 130px; border-radius: 8px; margin-bottom: 12px;
      background: var(--dark-3); border: 1px solid var(--dark-4);
      display: flex; align-items: center; justify-content: center;
      font-size: 48px;
    }

    /* Sub-grup field spesifik mobil/motor di modal */
    .subfield-divider {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      margin: 4px 0 -4px;
    }
  </style>
</head>
<body>

<div id="sidebar"></div>

<div id="main">
  <div class="topbar">
    <div class="topbar-title">Kelola Kendaraan</div>
    <div class="topbar-right">
      <div class="search-box"><i class="bi bi-search" style="font-size:13px;"></i><input type="text" placeholder="Cari kendaraan..." id="searchInput"/></div>
      <button class="btn-gold" onclick="openModal()"><i class="bi bi-plus me-1"></i>Tambah Kendaraan</button>
    </div>
  </div>

  <div class="content">

    <!-- ✅ FIX: tampilkan flash message dari RedirectAttributes (success/error) -->
    <div th:if="${success}" class="alert alert-success d-flex justify-content-between align-items-center" th:text="${success}" role="alert"></div>
    <div th:if="${error}" class="alert alert-danger d-flex justify-content-between align-items-center" th:text="${error}" role="alert"></div>

    <div class="d-flex gap-2 mb-4 flex-wrap">
      <button class="pill-tab active" data-filter="semua">Semua</button>
      <button class="pill-tab" data-filter="mobil">Mobil</button>
      <button class="pill-tab" data-filter="motor">Motor</button>
      <button class="pill-tab" data-filter="tersedia">Tersedia</button>
      <button class="pill-tab" data-filter="terjual">Terjual</button>
      <button class="pill-tab" data-filter="testdrive">Test Drive</button>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="s-icon gold"><i class="bi bi-grid-fill"></i></div>
          <div class="s-val" th:text="${totalStok}">0</div>
          <div class="s-label">Total Stok</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="s-icon blue"><i class="bi bi-car-front-fill"></i></div>
          <div class="s-val" th:text="${totalMobil}">0</div>
          <div class="s-label">Mobil</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="s-icon orange"><i class="bi bi-bicycle"></i></div>
          <div class="s-val" th:text="${totalMotor}">0</div>
          <div class="s-label">Motor</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="s-icon green"><i class="bi bi-check-circle-fill"></i></div>
          <div class="s-val" th:text="${totalTersedia}">0</div>
          <div class="s-label">Tersedia</div>
        </div>
      </div>
    </div>

    <div class="row g-3" id="kendaraanGrid">

      <div th:each="k : ${listKendaraan}"
           class="col-6 col-md-4 col-lg-3"
           th:attr="data-type=${k.jenis}, data-status=${#strings.toLowerCase(#strings.replace(k.status, ' ', ''))}">

        <div class="v-card">

          <div th:if="${k.foto != null and !#strings.isEmpty(k.foto)}">
            <img th:src="@{/uploads/kendaraan/{foto}(foto=${k.foto})}"
                 alt="Foto Kendaraan"
                 style="width: 100%; height: 160px; object-fit: cover; border-radius: 8px 8px 0 0;">
          </div>
          <div th:unless="${k.foto != null and !#strings.isEmpty(k.foto)}"
               class="v-thumb-emoji"
               th:text="${k.jenis == 'mobil' ? '🚗' : '🏍️'}"></div>

          <div class="d-flex justify-content-between align-items-start">
            <div>
              <div class="v-brand" th:text="${k.merk}">Merk</div>
              <div class="v-model" th:text="${k.tahun} + ' · ' + ${k.model}">Tahun · Model</div>
            </div>
            <span th:class="'b-status b-' + ${#strings.toLowerCase(#strings.replace(k.status, ' ', ''))}"
                  th:text="${k.status}">Status</span>
          </div>

          <div class="v-price" th:text="'Rp ' + ${#numbers.formatDecimal(k.harga, 0, 'COMMA', 0, 'POINT')}">Harga</div>

          <div style="font-size:11px;color:var(--muted);margin-top:4px">
            <span th:if="${k.jenis == 'mobil'}">
              <i class="bi bi-gear me-1"></i> Transmisi: <span th:text="${k.transmisi_mobil}"></span>
            </span>
            <span th:if="${k.jenis == 'motor'}">
              <i class="bi bi-gear me-1"></i> Kapasitas: <span th:text="${k.cc} + ' cc'"></span>
            </span>
          </div>

          <div class="d-flex gap-2 mt-3">
            <a th:href="@{/admin/kendaraan/detail/{id}(id=${k.id_kendaraan})}" class="btn-og flex-fill" style="font-size:11px;padding:5px 8px;text-decoration:none;text-align:center;">Detail</a>
            <a th:href="@{/admin/kendaraan/hapus/{id}(id=${k.id_kendaraan})}"
               class="btn-red flex-fill"
               style="font-size:11px; padding:5px 8px; text-decoration:none; text-align:center;"
               onclick="return confirm('Apakah Anda yakin ingin menghapus kendaraan ini?');">
              Hapus
            </a>
          </div>
        </div>
      </div>

    </div>

    <div class="pg-footer mt-4">AUTOPRIME SHOWROOM MANAGEMENT &nbsp;·&nbsp; © 2026</div>
  </div>
</div>

<!-- ── Modal Tambah Kendaraan ── -->
<div class="modal-overlay" id="modalTambah">
  <div class="modal-box">
    <div class="modal-title">Tambah Kendaraan</div>

    <form th:action="@{/admin/kendaraan/tambah}" method="POST" enctype="multipart/form-data" id="formTambahKendaraan">
      <div class="row g-3">
        <div class="col-6">
          <label class="lbl">Jenis</label>
          <select name="jenisKendaraan" id="jenisKendaraanSelect" class="form-c">
            <option value="Mobil">Mobil</option>
            <option value="Motor">Motor</option>
          </select>
        </div>
        <div class="col-6">
          <label class="lbl">Merk</label>
          <input name="merk" class="form-c" placeholder="Toyota, Honda, ..." required/>
        </div>
        <div class="col-6">
          <label class="lbl">Model</label>
          <input name="model" class="form-c" placeholder="Avanza, CBR, ..." required/>
        </div>
        <div class="col-6">
          <label class="lbl">Tahun</label>
          <input name="tahun" class="form-c" type="number" placeholder="2024" required/>
        </div>
        <div class="col-6">
          <label class="lbl">Harga (Rp)</label>
          <input name="harga" class="form-c" type="number" placeholder="250000000" required/>
        </div>
        <div class="col-6">
          <label class="lbl">Status</label>
          <select name="status" class="form-c">
            <option value="Tersedia">Tersedia</option>
            <option value="Test Drive">Test Drive</option>
            <option value="Terjual">Terjual</option>
          </select>
        </div>
        <div class="col-12">
          <label class="lbl">Warna</label>
          <input name="warna" class="form-c" placeholder="Merah, Putih, Hitam, ..."/>
        </div>

        <!-- ✅ FIX: field spesifik MOBIL — sebelumnya tidak ada sama sekali di form,
             jadi nilai yang diterima controller selalu null lalu di-hardcode jadi "-" -->
        <div class="col-12" id="fieldsMobil">
          <div class="subfield-divider">Detail Mobil</div>
          <div class="row g-3">
            <div class="col-6">
              <label class="lbl">Jenis Mobil</label>
              <select name="jenisMobil" class="form-c">
                <option value="Sedan">Sedan</option>
                <option value="SUV">SUV</option>
                <option value="MPV">MPV</option>
                <option value="Hatchback">Hatchback</option>
                <option value="Pickup">Pickup</option>
              </select>
            </div>
            <div class="col-6">
              <label class="lbl">Mesin</label>
              <select name="mesinMobil" class="form-c">
                <option value="Bensin">Bensin</option>
                <option value="Diesel">Diesel</option>
                <option value="Hybrid">Hybrid</option>
                <option value="Listrik">Listrik</option>
              </select>
            </div>
            <div class="col-6">
              <label class="lbl">Transmisi</label>
              <select name="transmisiMobil" class="form-c">
                <option value="Manual">Manual</option>
                <option value="Automatic">Automatic</option>
                <option value="CVT">CVT</option>
              </select>
            </div>
            <div class="col-6">
              <label class="lbl">Kapasitas (penumpang)</label>
              <input name="kapasitasMobil" class="form-c" type="number" placeholder="5"/>
            </div>
          </div>
        </div>

        <!-- ✅ FIX: field spesifik MOTOR — sama, sebelumnya tidak ada di form -->
        <div class="col-12" id="fieldsMotor" style="display:none;">
          <div class="subfield-divider">Detail Motor</div>
          <div class="row g-3">
            <div class="col-6">
              <label class="lbl">Jenis Motor</label>
              <select name="jenisMotor" class="form-c">
                <option value="Matic">Matic</option>
                <option value="Manual">Manual</option>
                <option value="Sport">Sport</option>
                <option value="Trail">Trail</option>
              </select>
            </div>
            <div class="col-6">
              <label class="lbl">Kapasitas Mesin (cc)</label>
              <input name="cc" class="form-c" type="number" placeholder="150"/>
            </div>
            <div class="col-6">
              <label class="lbl">Kapasitas Tangki (liter)</label>
              <input name="kapasitasTangki" class="form-c" type="number" step="0.1" placeholder="4.2"/>
            </div>
          </div>
        </div>

        <!-- ── UPLOAD FOTO ── -->
        <div class="col-12">
          <label class="lbl">Foto Kendaraan <span style="color:var(--muted);font-weight:400;">(opsional)</span></label>

          <div id="fotoPreviewWrap">
            <img id="fotoPreview" src="" alt="Preview Foto"/>
            <button type="button" id="hapusFotoBtn" title="Hapus foto">
              <i class="bi bi-x"></i>
            </button>
          </div>

          <div class="upload-area" id="uploadArea">
            <input type="file" name="foto" id="fotoInput" accept="image/*"/>
            <div class="upload-icon"><i class="bi bi-image"></i></div>
            <div class="upload-text">
              <span>Klik untuk pilih foto</span> atau drag & drop di sini<br>
              <small style="font-size:11px;margin-top:4px;display:block;">JPG, PNG, WEBP · Maks. 5 MB</small>
            </div>
          </div>
        </div>
        <!-- ── END UPLOAD FOTO ── -->

      </div>
      <div class="d-flex gap-2 mt-4 justify-content-end">
        <button type="button" class="btn-red" onclick="closeModal()">Batal</button>
        <button type="submit" class="btn-gold">Simpan Kendaraan</button>
      </div>
    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/sidebar.js"></script>
<script>
  renderSidebar('kendaraan.html');

  // ── Filter & Search ──────────────────────────────────────────────
  const searchInput   = document.getElementById('searchInput');
  const filterButtons = document.querySelectorAll('.pill-tab');
  const vehicleCards  = document.querySelectorAll('#kendaraanGrid > div');
  let currentFilter = 'semua';
  let currentSearch = '';

  function applyFilters() {
    vehicleCards.forEach(card => {
      const type   = card.getAttribute('data-type');
      const status = card.getAttribute('data-status');
      const text   = card.innerText.toLowerCase();
      const matchFilter = (currentFilter === 'semua') || (type === currentFilter) || (status === currentFilter);
      const matchSearch = text.includes(currentSearch);
      card.style.display = (matchFilter && matchSearch) ? '' : 'none';
    });
  }

  if (searchInput) {
    searchInput.addEventListener('input', function() {
      currentSearch = this.value.toLowerCase();
      applyFilters();
    });
  }

  filterButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      filterButtons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.getAttribute('data-filter');
      applyFilters();
    });
  });

  // ── Toggle field spesifik Mobil / Motor ─────────────────────────
  const jenisKendaraanSelect = document.getElementById('jenisKendaraanSelect');
  const fieldsMobil = document.getElementById('fieldsMobil');
  const fieldsMotor = document.getElementById('fieldsMotor');

  function toggleJenisFields() {
    const isMobil = jenisKendaraanSelect.value === 'Mobil';
    fieldsMobil.style.display = isMobil ? '' : 'none';
    fieldsMotor.style.display = isMobil ? 'none' : '';
  }
  jenisKendaraanSelect.addEventListener('change', toggleJenisFields);

  // ── Modal ────────────────────────────────────────────────────────
  function openModal()  {
    document.getElementById('modalTambah').classList.add('show');
    toggleJenisFields();
  }
  function closeModal() {
    document.getElementById('modalTambah').classList.remove('show');
    document.getElementById('formTambahKendaraan').reset();
    resetFotoUpload();
    toggleJenisFields();
  }
  document.getElementById('modalTambah').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // ── Upload Foto Preview ──────────────────────────────────────────
  const fotoInput    = document.getElementById('fotoInput');
  const fotoPreview  = document.getElementById('fotoPreview');
  const previewWrap  = document.getElementById('fotoPreviewWrap');
  const uploadArea   = document.getElementById('uploadArea');
  const hapusFotoBtn = document.getElementById('hapusFotoBtn');

  fotoInput.addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;

    if (file.size > 5 * 1024 * 1024) {
      alert('Ukuran foto terlalu besar. Maksimal 5 MB.');
      this.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = e => {
      fotoPreview.src = e.target.result;
      previewWrap.style.display = 'block';
      uploadArea.style.display  = 'none';
    };
    reader.readAsDataURL(file);
  });

  hapusFotoBtn.addEventListener('click', resetFotoUpload);

  function resetFotoUpload() {
    fotoInput.value = '';
    fotoPreview.src = '';
    previewWrap.style.display = 'none';
    uploadArea.style.display  = 'block';
  }

  // Drag & drop
  uploadArea.addEventListener('dragover',  e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const dt = new DataTransfer();
      dt.items.add(file);
      fotoInput.files = dt.files;
      fotoInput.dispatchEvent(new Event('change'));
    }
  });

  // State awal saat halaman load
  toggleJenisFields();
</script>
</body>
</html>
