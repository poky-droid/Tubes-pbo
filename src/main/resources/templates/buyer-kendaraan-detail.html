<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${kendaraan['merk']} + ' ' + ${kendaraan['model']} + ' - Detail Kendaraan'">
        Detail Kendaraan
    </title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root{
            --primary:#C2410C;
            --primary-dark:#9A3412;
            --bg:#FAFAF9;
            --card:#FFFFFF;
            --text:#1C1917;
            --muted:#78716C;
            --border:#E7E5E4;
            --success:#15803D;
            --success-bg:#DCFCE7;
            --warning:#92400E;
            --warning-bg:#FEF3C7;
            --danger:#B91C1C;
            --danger-bg:#FEE2E2;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            background:var(--bg);
            color:var(--text);
        }

        .container{
            max-width:1200px;
            margin:auto;
            padding:30px 20px;
        }

        .breadcrumb{
            margin-bottom:20px;
            font-size:14px;
            color:var(--muted);
        }

        .breadcrumb a{
            color:var(--muted);
            text-decoration:none;
        }

        .detail-layout{
            display:grid;
            grid-template-columns:1.2fr 1fr;
            gap:30px;
        }

        .card{
            background:var(--card);
            border:1px solid var(--border);
            border-radius:16px;
            overflow:hidden;
        }

        .image-wrapper{
            width:100%;
            height:500px;
            background:#f5f5f5;
        }

        .image-wrapper img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        .no-image{
            height:500px;
            display:flex;
            justify-content:center;
            align-items:center;
            color:var(--muted);
        }

        .content{
            padding:25px;
        }

        .badge{
            display:inline-block;
            padding:6px 12px;
            border-radius:999px;
            font-size:13px;
            font-weight:600;
            margin-bottom:15px;
        }

        .badge-mobil{
            background:#DBEAFE;
            color:#1D4ED8;
        }

        .badge-motor{
            background:#FCE7F3;
            color:#BE185D;
        }

        h1{
            font-size:32px;
            margin-bottom:8px;
        }

        .subtitle{
            color:var(--muted);
            margin-bottom:20px;
        }

        .price{
            font-size:36px;
            font-weight:800;
            color:var(--primary);
            margin-bottom:20px;
        }

        .status{
            display:inline-block;
            padding:8px 15px;
            border-radius:999px;
            font-size:14px;
            font-weight:600;
            margin-bottom:25px;
        }

        .tersedia{
            background:var(--success-bg);
            color:var(--success);
        }

        .disewa{
            background:var(--warning-bg);
            color:var(--warning);
        }

        .perawatan{
            background:var(--danger-bg);
            color:var(--danger);
        }

        .spec-table{
            width:100%;
            border-collapse:collapse;
        }

        .spec-table tr{
            border-bottom:1px solid var(--border);
        }

        .spec-table td{
            padding:14px;
        }

        .spec-table td:first-child{
            width:220px;
            font-weight:600;
            background:#fafafa;
        }

        .actions{
            display:flex;
            gap:10px;
            margin-top:25px;
        }

        .btn{
            flex:1;
            text-align:center;
            padding:14px;
            border-radius:10px;
            text-decoration:none;
            font-weight:600;
        }

        .btn-primary{
            background:var(--primary);
            color:white;
        }

        .btn-secondary{
            border:1px solid var(--border);
            color:var(--text);
            background:white;
        }

        .btn-disabled{
            background:#d1d5db;
            color:#6b7280;
            cursor:not-allowed;
            pointer-events:none;
        }

        @media(max-width:768px){
            .detail-layout{
                grid-template-columns:1fr;
            }

            .image-wrapper{
                height:300px;
            }

            .spec-table td:first-child{
                width:140px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="breadcrumb">
        <a th:href="@{/buyer/kendaraan}">Kendaraan</a>
        /
        <span th:text="${kendaraan['merk']} + ' ' + ${kendaraan['model']}"></span>
    </div>

    <div class="detail-layout">

        <!-- FOTO -->
        <div class="card">

            <div class="image-wrapper">

                <img th:if="${kendaraan['foto'] != null}"
                     th:src="@{/uploads/kendaraan/{foto}(foto=${kendaraan['foto']})}"
                     alt="Foto Kendaraan">

                <div class="no-image"
                     th:if="${kendaraan['foto'] == null}">
                    Tidak ada foto kendaraan
                </div>

            </div>

        </div>

        <!-- DETAIL -->
        <div class="card">

            <div class="content">

                <span class="badge badge-mobil"
                      th:if="${kendaraan['jenis'] == 'mobil'}">
                    🚗 Mobil
                </span>

                <span class="badge badge-motor"
                      th:if="${kendaraan['jenis'] == 'motor'}">
                    🏍️ Motor
                </span>

                <h1 th:text="${kendaraan['merk']} + ' ' + ${kendaraan['model']}">
                    Nama Kendaraan
                </h1>

                <div class="subtitle">
                    Tahun
                    <span th:text="${kendaraan['tahun']}"></span>
                </div>

                <div class="price">
                    Rp
                    <span th:text="${#numbers.formatDecimal(kendaraan['harga'],0,'COMMA',0,'POINT')}"></span>
                    / Hari
                </div>

                <div class="status tersedia"
                     th:if="${#strings.equalsIgnoreCase(kendaraan['status'],'Tersedia')}">
                    Tersedia
                </div>

                <div class="status disewa"
                     th:if="${#strings.equalsIgnoreCase(kendaraan['status'],'Disewa')}">
                    Sedang Disewa
                </div>

                <div class="status perawatan"
                     th:if="${#strings.equalsIgnoreCase(kendaraan['status'],'Perawatan')}">
                    Dalam Perawatan
                </div>

                <table class="spec-table">

                    <tr>
                        <td>ID Kendaraan</td>
                        <td th:text="${kendaraan['id_kendaraan']}"></td>
                    </tr>

                    <tr>
                        <td>Merk</td>
                        <td th:text="${kendaraan['merk']}"></td>
                    </tr>

                    <tr>
                        <td>Model</td>
                        <td th:text="${kendaraan['model']}"></td>
                    </tr>

                    <tr>
                        <td>Tahun</td>
                        <td th:text="${kendaraan['tahun']}"></td>
                    </tr>

                    <tr>
                        <td>Warna</td>
                        <td th:text="${kendaraan['warna']}"></td>
                    </tr>

                    <tr>
                        <td>Status</td>
                        <td th:text="${kendaraan['status']}"></td>
                    </tr>

                    <!-- DATA MOBIL -->
                    <th:block th:if="${kendaraan['jenis'] == 'mobil'}">

                        <tr>
                            <td>Jenis Mobil</td>
                            <td th:text="${kendaraan['jenis_mobil']}"></td>
                        </tr>

                        <tr>
                            <td>Mesin</td>
                            <td th:text="${kendaraan['mesin_mobil']}"></td>
                        </tr>

                        <tr>
                            <td>Transmisi</td>
                            <td th:text="${kendaraan['transmisi_mobil']}"></td>
                        </tr>

                        <tr>
                            <td>Kapasitas</td>
                            <td th:text="${kendaraan['kapasitas_mobil']} + ' Orang'"></td>
                        </tr>

                    </th:block>

                    <!-- DATA MOTOR -->
                    <th:block th:if="${kendaraan['jenis'] == 'motor'}">

                        <tr>
                            <td>Jenis Motor</td>
                            <td th:text="${kendaraan['jenis_motor']}"></td>
                        </tr>

                        <tr>
                            <td>CC</td>
                            <td th:text="${kendaraan['cc']} + ' CC'"></td>
                        </tr>

                        <tr>
                            <td>Kapasitas Tangki</td>
                            <td th:text="${kendaraan['kapasitas_tangki']} + ' Liter'"></td>
                        </tr>

                    </th:block>

                </table>

                <div class="actions">

                    <a th:if="${#strings.equalsIgnoreCase(kendaraan['status'],'Tersedia')}"
                       th:href="@{'/buyer/sewa/' + ${kendaraan['id_kendaraan']}}"
                       class="btn btn-primary">
                        pesan
                    </a>

                    <a th:unless="${#strings.equalsIgnoreCase(kendaraan['status'],'Tersedia')}"
                       class="btn btn-disabled">
                        Tidak Tersedia
                    </a>

                    <a th:href="@{/}"
                       class="btn btn-secondary">
                        Kembali
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
