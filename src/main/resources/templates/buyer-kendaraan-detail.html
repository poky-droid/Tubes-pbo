<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${kendaraan.merk + ' ' + kendaraan.model + ' - Detail Kendaraan'}">
        Detail Kendaraan
    </title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root{
            --rust:#C2410C;
            --rust-dark:#9A3412;
            --ink:#1C1917;
            --paper:#FAFAF9;
            --line:#E7E5E4;
            --muted:#78716C;
            --ok-bg:#ECFDF3;
            --ok-fg:#15803D;
            --sold-bg:#F4F4F5;
            --sold-fg:#71717A;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            background:var(--paper);
            color:var(--ink);
        }

        .topbar{
            background:#fff;
            border-bottom:1px solid var(--line);
        }

        .topbar-inner{
            max-width:1100px;
            margin:auto;
            padding:18px 24px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .brand{
            font-family:'Sora',sans-serif;
            font-weight:800;
            font-size:20px;
        }

        .breadcrumb{
            font-size:13px;
            color:var(--muted);
        }

        .breadcrumb a{
            color:var(--muted);
            text-decoration:none;
        }

        .container{
            max-width:1100px;
            margin:auto;
            padding:32px 24px;
        }

        .detail-grid{
            display:grid;
            grid-template-columns:1.3fr 1fr;
            gap:40px;
        }

        .gallery{
            border-radius:16px;
            overflow:hidden;
            background:#fff;
            border:1px solid var(--line);
        }

        .gallery img{
            width:100%;
            height:500px;
            object-fit:cover;
            display:block;
        }

        .placeholder{
            height:500px;
            display:flex;
            justify-content:center;
            align-items:center;
            color:var(--muted);
        }

        .info-panel{
            background:#fff;
            border:1px solid var(--line);
            border-radius:16px;
            padding:24px;
        }

        .eyebrow{
            color:var(--rust);
            font-weight:700;
            text-transform:uppercase;
            font-size:13px;
            margin-bottom:8px;
        }

        .title{
            font-family:'Sora',sans-serif;
            font-size:32px;
            font-weight:800;
            margin-bottom:10px;
        }

        .subtitle{
            color:var(--muted);
            margin-bottom:20px;
        }

        .price{
            font-family:'Sora',sans-serif;
            font-size:36px;
            font-weight:800;
            margin-bottom:25px;
            color:var(--rust);
        }

        .status{
            display:inline-block;
            padding:8px 14px;
            border-radius:999px;
            font-size:14px;
            font-weight:600;
            margin-bottom:24px;
        }

        .status.available{
            background:var(--ok-bg);
            color:var(--ok-fg);
        }

        .status.sold{
            background:var(--sold-bg);
            color:var(--sold-fg);
        }

        .spec-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:16px;
            margin-bottom:25px;
        }

        .spec-item{
            padding:14px;
            border:1px solid var(--line);
            border-radius:10px;
        }

        .spec-label{
            display:block;
            font-size:12px;
            color:var(--muted);
            margin-bottom:6px;
        }

        .spec-value{
            font-weight:600;
        }

        .actions{
            display:flex;
            gap:12px;
        }

        .btn{
            flex:1;
            text-align:center;
            padding:14px;
            border-radius:10px;
            text-decoration:none;
            font-weight:600;
        }

        .btn-primary{
            background:var(--rust);
            color:white;
        }

        .btn-secondary{
            border:1px solid var(--line);
            color:var(--ink);
            background:white;
        }

        .section{
            margin-top:40px;
        }

        .section-title{
            font-family:'Sora',sans-serif;
            font-size:24px;
            margin-bottom:18px;
        }

        .table{
            background:white;
            border:1px solid var(--line);
            border-radius:10px;
            overflow:hidden;
        }

        .row{
            display:grid;
            grid-template-columns:200px 1fr;
        }

        .row:not(:last-child){
            border-bottom:1px solid var(--line);
        }

        .row .label{
            background:#f8f8f8;
            padding:14px;
            font-weight:600;
        }

        .row .value{
            padding:14px;
        }

        @media(max-width:768px){
            .detail-grid{
                grid-template-columns:1fr;
            }

            .gallery img{
                height:300px;
            }

            .row{
                grid-template-columns:130px 1fr;
            }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-inner">
        <div class="brand">AutoMarket</div>

        <div class="breadcrumb">
            <a th:href="@{/}">Beranda</a>
            /
            <span th:text="${kendaraan.merk + ' ' + kendaraan.model}"></span>
        </div>
    </div>
</div>

<div class="container">

    <div class="detail-grid">

        <!-- FOTO -->
        <div class="gallery">

            <img th:if="${kendaraan.foto != null}"
                 th:src="@{${kendaraan.foto}}"
                 alt="Foto Kendaraan">

            <div class="placeholder"
                 th:unless="${kendaraan.foto != null}">
                Tidak ada foto
            </div>

        </div>

        <!-- INFO -->
        <div class="info-panel">

            <div class="eyebrow"
                 th:text="${kendaraan.merk}">
                Toyota
            </div>

            <h1 class="title"
                th:text="${kendaraan.merk + ' ' + kendaraan.model}">
                Toyota Avanza
            </h1>

            <div class="subtitle">
                Tahun
                <span th:text="${kendaraan.tahun}">2024</span>
            </div>

            <div class="price">
                Rp
                <span th:text="${#numbers.formatDecimal(kendaraan.harga,0,'COMMA',0,'POINT')}">
                    250000000
                </span>
            </div>

            <div th:if="${kendaraan.status == 'TERSEDIA'}"
                 class="status available">
                Tersedia
            </div>

            <div th:unless="${kendaraan.status == 'TERSEDIA'}"
                 class="status sold">
                Terjual
            </div>

            <div class="spec-grid">

                <div class="spec-item">
                    <span class="spec-label">Merk</span>
                    <span class="spec-value"
                          th:text="${kendaraan.merk}">
                    </span>
                </div>

                <div class="spec-item">
                    <span class="spec-label">Model</span>
                    <span class="spec-value"
                          th:text="${kendaraan.model}">
                    </span>
                </div>

                <div class="spec-item">
                    <span class="spec-label">Tahun</span>
                    <span class="spec-value"
                          th:text="${kendaraan.tahun}">
                    </span>
                </div>

                <div class="spec-item">
                    <span class="spec-label">Status</span>
                    <span class="spec-value"
                          th:text="${kendaraan.status}">
                    </span>
                </div>

            </div>

            <div class="actions">

                <a class="btn btn-primary"
                   href="#">
                    Hubungi Penjual
                </a>

                <a class="btn btn-secondary"
                   th:href="@{/}">
                    Kembali
                </a>

            </div>

        </div>

    </div>

    <!-- SPESIFIKASI -->
    <div class="section">

        <h2 class="section-title">
            Detail Kendaraan
        </h2>

        <div class="table">

            <div class="row">
                <div class="label">ID</div>
                <div class="value"
                     th:text="${kendaraan.id_kendaraan}">
                </div>
            </div>

            <div class="row">
                <div class="label">Merk</div>
                <div class="value"
                     th:text="${kendaraan.merk}">
                </div>
            </div>

            <div class="row">
                <div class="label">Model</div>
                <div class="value"
                     th:text="${kendaraan.model}">
                </div>
            </div>

            <div class="row">
                <div class="label">Tahun</div>
                <div class="value"
                     th:text="${kendaraan.tahun}">
                </div>
            </div>

            <div class="row">
                <div class="label">Harga</div>
                <div class="value">
                    Rp
                    <span th:text="${#numbers.formatDecimal(kendaraan.harga,0,'COMMA',0,'POINT')}">
                    </span>
                </div>
            </div>

            <div class="row">
                <div class="label">Status</div>
                <div class="value"
                     th:text="${kendaraan.status}">
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
